name: mizhara

x-api-env: &api-env
  GO_ENV: production
  APP_URL: http://localhost:8080
  MONGODB_URI: mongodb://mongo:27017/mizhara
  WAIT_FOR_MONGO: "true"
  MONGO_HOST: mongo
  SEED_IF_EMPTY: "true"
  SEED_SKIP_IMAGES: "true"
  JWT_SECRET: local-dev-jwt-secret

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build: ./mizhara-backend
    image: mizhara-api:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./mizhara-backend/.env
    environment:
      <<: *api-env
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./mizhara-web
      args:
        VITE_API_URL: http://localhost:3000
    image: mizhara-web:latest
    restart: unless-stopped
    ports:
      - "8080:5000"
    environment:
      PORT: 5000
    depends_on:
      api:
        condition: service_healthy

volumes:
  mongo_data:
