# Blueprint: New → Blueprint → connect repo
# MongoDB: use Atlas → set MONGODB_URI on mizhara-api (Network Access: 0.0.0.0/0)
services:
  - type: web
    name: mizhara-api
    runtime: docker
    plan: free
    dockerfilePath: ./mizhara-backend/Dockerfile
    dockerContext: ./mizhara-backend
    healthCheckPath: /api/health
    envVars:
      - key: GO_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: APP_URL
        fromService:
          type: web
          name: mizhara-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SEED_IF_EMPTY
        value: "true"
      - key: SEED_SKIP_IMAGES
        value: "true"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CUSTOMER_EMAIL
        sync: false
      - key: CUSTOMER_PASSWORD
        sync: false
      - key: CUSTOMER_PHONE
        sync: false

  - type: web
    name: mizhara-web
    runtime: docker
    plan: free
    dockerfilePath: ./mizhara-web/Dockerfile
    dockerContext: ./mizhara-web
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: mizhara-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_INSTAGRAM_URL
        sync: false
      - key: VITE_WHATSAPP_NUMBER
        sync: false
      - key: VITE_SUPPORT_EMAIL
        sync: false
